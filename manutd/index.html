<!doctype html>
<html>
<head>
  <meta charset="utf-8">
  <meta name="author" content="Tamas Major" />
  <meta name="viewport" content="width=device-width,minimum-scale=1,initial-scale=1">
  <meta name="theme-color" content="#DA020E">
  <title>Fixtures</title>
  <!-- TODO TM: serviceworker -->
  <link rel="shortcut icon" href="/favicon.ico" />
  <link rel="stylesheet" href="style.css">
  <script defer src="script.min.js"></script>
</head>
<body>
  <div class="container">

    <div class="next-fixture-container"></div>

    <template id="next-fixture-template">
      <p class="next-label">NEXT</p>
      <p class="next-opposition-label"></p>
      <p class="next-kickoff-label"></p>
      <p class="next-competition-label"></p>
    </template>


    <div class="fixtures-container"></div>

    <template id="fixture-template">
      <div class="fixture-item">
        <div class="crest"></div>
        <div class="details">
          <p class="opponent"></p>
          <p class="competition"></p>
          <p class="kickoff"></p>
        </div>
        <div class="type-container">
          <div class="type"></div>
        </div>
      </div>
    </template>

  </div>
</body>
</html>
